<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javascript Output</title>
</head>
<header>
    <h1>Demostración de Output en Javascript</h1>
</header>
<body>
    <p>El siguiente boton muestra una alerta con mi nombre: </p>
    <button onclick='alert("Eduardo Reza")'>Boton alerta</button>
    <p>Abajo de este parrafo hay un texto, haz click en el boton para revelarlo</p>
    <p id="p_vacio"></p>
    <button onclick='document.getElementById("p_vacio").innerHTML = "¡Texto actualizado con Javascript!"'>Haz click aqui</button>
    <script> console.log("La pagina se ha cargado correctamente")</script>
</body>
</html>
